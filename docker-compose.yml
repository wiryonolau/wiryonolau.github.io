services:
  dev:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
